<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#0A1F44" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#00B4D8" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A1F44" />
      <stop offset="100%" stop-color="#00B4D8" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Icon Section (Left) -->
  <g transform="translate(10, 10)">
    <!-- Outer brain outline (abstract nodes) -->
    <path d="M 50,15 C 65,15 78,25 78,40 C 78,45 82,48 85,50 C 95,54 95,70 85,74 C 82,76 80,80 80,83 C 78,95 62,100 50,90 C 38,100 22,95 20,83 C 20,80 18,76 15,74 C 5,70 5,54 15,50 C 18,48 22,45 22,40 C 22,25 35,15 50,15 Z" fill="none" stroke="url(#blueGrad)" stroke-width="3" stroke-dasharray="4 2" />
    
    <!-- Synaptic Nodes -->
    <circle cx="50" cy="20" r="4" fill="#00B4D8" />
    <circle cx="75" cy="40" r="3" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="85" cy="62" r="4" fill="#00B4D8" />
    <circle cx="70" cy="85" r="3" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="50" cy="92" r="5" fill="#00B4D8" />
    <circle cx="30" cy="85" r="3.5" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="15" cy="62" r="4" fill="#00B4D8" />
    <circle cx="25" cy="40" r="3" fill="#00F5D4" filter="url(#glow)" />
    <circle cx="50" cy="55" r="7" fill="url(#glowGrad)" filter="url(#glow)" />
    
    <!-- Connection lines -->
    <line x1="50" y1="20" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="75" y1="40" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="85" y1="62" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="70" y1="85" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="50" y1="92" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="30" y1="85" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="15" y1="62" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    <line x1="25" y1="40" x2="50" y2="55" stroke="#00B4D8" stroke-width="1.5" opacity="0.6" />
    
    <!-- Cross connections -->
    <line x1="25" y1="40" x2="50" y2="20" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    <line x1="75" y1="40" x2="50" y2="20" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    <line x1="75" y1="40" x2="85" y2="62" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    <line x1="70" y1="85" x2="85" y2="62" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    <line x1="30" y1="85" x2="15" y2="62" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    <line x1="25" y1="40" x2="15" y2="62" stroke="#00B4D8" stroke-width="1" opacity="0.4" />
    
    <!-- Stylized "i" inside the center node -->
    <circle cx="50" cy="51" r="1.5" fill="#0A1F44" />
    <line x1="50" y1="54" x2="50" y2="59" stroke="#0A1F44" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Text Section (Right) -->
  <g transform="translate(120, 75)">
    <!-- iBrains Text -->
    <text font-family="'Poppins', 'Montserrat', sans-serif" font-size="52" font-weight="800" letter-spacing="1">
      <tspan fill="#0A1F44">i</tspan><tspan fill="url(#blueGrad)">Brains</tspan>
    </text>
    <!-- Small tech indicator -->
    <rect x="235" y="-45" width="8" height="8" rx="2" fill="#00F5D4" filter="url(#glow)" />
    <!-- Subtitle -->
    <text y="24" font-family="'Inter', 'Open Sans', sans-serif" font-size="14" font-weight="600" fill="#6c757d" letter-spacing="4">TECHNOLOGY &amp; INNOVATION</text>
  </g>
</svg>
